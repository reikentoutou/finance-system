name: Release Windows desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-win:
    # 仅标签 v*；手动运行时请在 “Run workflow” 选择带 v 前缀的标签，勿选 main
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 版本仅由根目录 package.json 的 packageManager 声明，勿在此再写 version，否则会报 Multiple versions of pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pack self-contained Windows NSIS (x64)
        run: pnpm run pack:desktop:win

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Desktop ${{ github.ref_name }} (Windows x64)
          body: |
            **安装程序**：请下载 **`FinanceSystem-*-Windows-Setup-x64.exe`**（不要下载 **Source code** zip/tar）。

            安装包为 **自包含**：已内置 Node、API 与前端；**客户双击桌面快捷方式 / exe 即可使用**，无需单独安装 Node。首次运行会在 `%AppData%\\FinanceSystem` 生成配置与数据库目录；交付前可在该目录编辑 `.env`（如 `JWT_SECRET`）。

            变更说明见 [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)。
          files: |
            apps/desktop/release/*Setup*.exe
            apps/desktop/release/*.blockmap
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
